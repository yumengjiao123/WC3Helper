name: CMake MSVC x86 Build & Deploy Pages
on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  BUILD_DIR: build_win32
  CONFIG: Release
  ARCH: Win32

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: CMake Configure
        run: |
          mkdir ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake .. -A ${{ env.ARCH }}

      - name: CMake Build
        run: |
          cd ${{ env.BUILD_DIR }}
          cmake --build . --config ${{ env.CONFIG }} --parallel

      - name: Package & Generate Page
        run: |
          mkdir pages
          $file = "$env:BUILD_DIR\Release\strom80.mix"
          if (-not (Test-Path $file)) {
            Write-Error "Missing file strom80.mix"
            exit 1
          }
          Copy-Item $file pages\
          Compress-Archive -Path pages\strom80.mix -DestinationPath pages\win32-release.zip

          $html = @'
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Download strom80.mix</title>
</head>
<body>
<h3>Win32 Release File</h3>
<p><a href="strom80.mix">strom80.mix</a></p>
<p><a href="win32-release.zip">zip package</a></p>
</body>
</html>
'@
          $html | Out-File pages\index.html -Encoding utf8

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deploy