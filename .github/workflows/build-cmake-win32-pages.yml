name: CMake MSVC x86 Build & Deploy Pages

# 推送主分支触发
on:
  push:
    branches: [ main, master ]

# Pages部署权限
permissions:
  contents: read
  pages: write
  id-token: write

# 全局变量，按需修改
env:
  BUILD_DIR: build_win32
  INSTALL_DIR: install_win32
  CONFIG: Release
  ARCH: Win32

jobs:
  build:
    runs-on: windows-latest
    steps:
      # 拉取源码
      - name: Checkout source
        uses: actions/checkout@v4

      # 加载VS2022 MSVC环境
      - name: Setup MSVC 2022 x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          # vsversion: "2022"
          arch: x86

      # 创建构建目录，CMake生成32位工程
      - name: CMake Configure
        run: |
          mkdir ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake .. -A ${{ env.ARCH }} -DCMAKE_INSTALL_PREFIX=../${{ env.INSTALL_DIR }}

      # MSBuild编译Release
      - name: CMake Build
        run: |
          cd ${{ env.BUILD_DIR }}
          cmake --build . --config ${{ env.CONFIG }} --parallel

      # 安装文件到install目录（exe/dll/lib/header）
      - name: CMake Install
        run: |
          cd ${{ env.BUILD_DIR }}
          cmake --install . --config ${{ env.CONFIG }}

      # 打包所有输出为zip，放入pages站点根目录
      - name: Package binaries
        run: |
          mkdir pages
          Compress-Archive -Path ${{ env.INSTALL_DIR }}/* -DestinationPath pages/win32-release.zip

      # 上传pages产物用于部署
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  # 部署Pages页面
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
        