env:
  BUILD_DIR: build_win32
  CONFIG: Release

steps:
  - name: Checkout source
    uses: actions/checkout@v4

  - name: Init MSVC x86 32bit env manually
    run: |
      $vsPath = & "C:\Program Files\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
      cmd /c "$vsPath\VC\Auxiliary\Build\vcvarsall.bat" x86 && set > env.txt
      Get-Content env.txt | ForEach-Object {
        if ($_ -match '^(.*?)=(.*)$') {
          [Environment]::SetEnvironmentVariable($matches[1], $matches[2], "Process")
        }
      }
      cl.exe
      cmake --version

  # CMake 生成32位工程
  - name: CMake Configure Win32
    run: |
      mkdir $env:BUILD_DIR
      cd $env:BUILD_DIR
      cmake .. -A Win32

  # 编译 Release
  - name: CMake Build
    run: |
      cd $env:BUILD_DIR
      cmake --build . --config $env:CONFIG --parallel

  # 新建打包目录，复制编译产物 strom80.mix
  - name: Copy output file
    run: |
      mkdir pages
      # 你的编译输出路径 build_win32/Release/strom80.mix
      Copy-Item "$env:BUILD_DIR\Release\strom80.mix" -Destination pages\strom80.mix

  # 打包压缩包 + 生成下载网页
  - name: Package & Create index.html
    run: |
      Compress-Archive -Path pages\strom80.mix -DestinationPath pages\win32-release.zip
      @'
      <!DOCTYPE html>
      <html>
      <head>
        <meta charset="utf-8">
        <title>Win32 Release Build</title>
      </head>
      <body>
        <h1>Windows 32位 插件 strom80.mix</h1>
        <p><a href="win32-release.zip">下载压缩包 win32-release.zip</a></p>
        <p>单独文件：<a href="strom80.mix">strom80.mix</a></p>
      </body>
      </html>
      '@ | Out-File pages/index.html -Encoding utf8

  - name: Upload Pages Artifact
    uses: actions/upload-pages-artifact@v3
    with:
      path: pages
